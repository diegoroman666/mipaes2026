<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi PAES 2026 | Diego Román</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-dark: #020617;
            --bg-light: #ffffff;
            --zoom-level: 1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        #main-app-container {
            zoom: var(--zoom-level);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: zoom 0.2s ease;
        }

        body.dark-mode { background-color: var(--bg-dark); color: #f8fafc; }
        body.light-mode { background-color: var(--bg-light); color: #0f172a; }

        /* Contenedor 3D para el efecto Yu-Gi-Oh */
        .flip-container {
            perspective: 1000px;
            width: 100%;
            max-width: 600px;
            height: 480px;
            position: relative;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-container.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 2rem;
        }

        .flip-back {
            transform: rotateY(180deg);
        }

        /* Glassmorphism */
        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light-mode .glass {
            background: rgba(15, 23, 42, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .floating-book {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-100%);
        }
        #sidebar.open { transform: translateX(0); }

        #search-suggestions {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            z-index: 100;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
        }

        /* Ojo Animado */
        .eye-container {
            width: 40px;
            height: 25px;
            background: white;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--primary);
        }
        .pupil {
            width: 12px;
            height: 12px;
            background: #0f172a;
            border-radius: 50%;
            position: absolute;
            animation: lookAround 4s infinite ease-in-out;
        }
        @keyframes lookAround {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, -2px); }
            50% { transform: translate(-10px, 2px); }
            75% { transform: translate(0, 5px); }
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.active { border-color: white; }

        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .border-primary { border-color: var(--primary); }

        /* Estilo personalizado de scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Sidebar -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 glass z-[60] p-6 shadow-2xl overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xl">Personalización</h3>
            <button onclick="toggleSidebar()" class="text-2xl hover:text-primary transition-colors">&times;</button>
        </div>
        
        <div class="space-y-8">
            <!-- Sección de Zoom -->
            <div>
                <p class="text-primary font-bold text-xs uppercase mb-4 flex items-center gap-2">
                    <i class="fas fa-search-plus"></i> Tamaño de Interfaz
                </p>
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/10">
                    <button onclick="adjustZoom(-0.1)" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center">
                        <i class="fas fa-minus"></i>
                    </button>
                    <span id="zoom-label" class="flex-grow text-center font-bold">100%</span>
                    <button onclick="adjustZoom(0.1)" class="w-10 h-10 rounded-lg bg-white/10 hover:bg-white/20 transition-all flex items-center justify-center">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <!-- Sección de Colores (Paletas) -->
            <div>
                <p class="text-primary font-bold text-xs uppercase mb-4 flex items-center gap-2">
                    <i class="fas fa-palette"></i> Paleta de Colores
                </p>
                <div class="grid grid-cols-4 gap-3 bg-white/5 p-4 rounded-xl border border-white/10">
                    <div class="color-dot active bg-blue-500" onclick="setTheme('#3b82f6', this)"></div>
                    <div class="color-dot bg-emerald-500" onclick="setTheme('#10b981', this)"></div>
                    <div class="color-dot bg-purple-500" onclick="setTheme('#a855f7', this)"></div>
                    <div class="color-dot bg-rose-500" onclick="setTheme('#f43f5e', this)"></div>
                    <div class="color-dot bg-orange-500" onclick="setTheme('#f97316', this)"></div>
                    <div class="color-dot bg-cyan-500" onclick="setTheme('#06b6d4', this)"></div>
                    <div class="color-dot bg-pink-500" onclick="setTheme('#ec4899', this)"></div>
                    <div class="color-dot bg-amber-500" onclick="setTheme('#f59e0b', this)"></div>
                </div>
                <p class="text-[10px] text-slate-500 mt-2 italic text-center">Dale ánimo a tu estudio con tu color favorito</p>
            </div>

            <div class="pt-6 border-t border-white/10">
                <p class="text-primary font-bold text-xs uppercase mb-2">Info</p>
                <p class="text-sm font-semibold">Diego Román</p>
                <p class="text-xs text-slate-500 mb-4">Ingeniero Informático</p>
                <p class="text-[10px] opacity-50 uppercase">PAES Master 2026 v7.1</p>
            </div>
        </div>
    </div>

    <!-- Main Container para Zoom -->
    <div id="main-app-container">
        <!-- Header -->
        <header class="fixed top-0 w-full z-50 glass border-b border-white/5 px-4 md:px-8 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-lg">
                    <i class="fas fa-bars text-xl text-primary"></i>
                </button>
                <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <div class="eye-container ml-2">
                    <div class="pupil"></div>
                </div>
            </div>

            <div class="absolute left-1/2 -translate-x-1/2">
                <h1 class="font-black text-lg md:text-xl tracking-tighter uppercase">Mi PAES <span class="text-primary">2026</span></h1>
            </div>

            <div class="flex items-center gap-3">
                <div class="relative hidden sm:block">
                    <input type="text" id="main-search" oninput="handleSearch(this.value)" placeholder="Buscar asignatura..." class="bg-slate-500/10 border border-white/10 rounded-full py-1.5 pl-4 pr-10 focus:outline-none focus:ring-1 focus:ring-primary w-32 md:w-48 text-sm">
                    <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <div id="search-suggestions" class="glass shadow-xl p-2">
                        <div id="suggestions-list" class="flex flex-col gap-1"></div>
                    </div>
                </div>
                <a href="javascript:location.reload()" class="w-10 h-10 flex items-center justify-center bg-primary hover:opacity-80 text-white rounded-full shadow-lg transition-all">
                    <i class="fas fa-home"></i>
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow pt-24 pb-12 px-6 flex flex-col items-center justify-center">
            <div class="relative w-full max-w-4xl flex items-center justify-center">
                <button onclick="prevSubject()" class="absolute left-0 md:left-4 z-10 w-12 h-12 glass rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-xl">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div id="flip-box" class="flip-container">
                    <div class="flip-card-inner">
                        <!-- FRENTE -->
                        <div class="flip-front glass border-2 border-primary/20 shadow-2xl p-8 floating-book">
                            <div id="subject-icon" class="w-32 h-44 bg-primary rounded-lg mb-6 shadow-2xl flex items-center justify-center overflow-hidden">
                                <i class="fas fa-book text-6xl text-white/20"></i>
                            </div>
                            <h2 id="subject-title" class="text-3xl font-black mb-6">Lenguaje</h2>
                            <button onclick="toggleFlip()" class="px-8 py-3 bg-primary hover:opacity-90 text-white rounded-full text-sm font-bold transition-all flex items-center gap-2 shadow-lg">
                                <i class="fas fa-eye"></i>
                                <span>Mostrar Ejes Temáticos</span>
                            </button>
                        </div>

                        <!-- ATRÁS -->
                        <div class="flip-back glass border-2 border-primary/40 shadow-2xl p-6">
                            <h3 id="back-subject-title" class="text-2xl font-black text-primary mb-4 uppercase">Ejes de Lenguaje</h3>
                            <div id="units-grid" class="grid grid-cols-2 gap-4 w-full h-full overflow-y-auto pr-2 custom-scrollbar">
                                <!-- JS -->
                            </div>
                            <button onclick="toggleFlip()" class="mt-4 px-6 py-2 border-2 border-primary text-primary hover:bg-primary hover:text-white rounded-full text-sm font-bold transition-all flex items-center gap-2">
                                <i class="fas fa-eye-slash"></i>
                                <span>Volver al Ramo</span>
                            </button>
                        </div>
                    </div>
                </div>

                <button onclick="nextSubject()" class="absolute right-0 md:right-4 z-10 w-12 h-12 glass rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition-all shadow-xl">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="glass border-t border-white/5 py-4 px-6 text-center mt-auto">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-2">
                <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">© 2026 PAES Master Elite</p>
                <p class="text-[10px] text-slate-500">Química, Física, Biología, Historia, Lenguaje, M1 y M2</p>
                <div class="flex gap-4">
                    <a href="#" class="text-slate-500 hover:text-primary text-sm transition-colors"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="text-slate-500 hover:text-primary text-sm transition-colors"><i class="fab fa-github"></i></a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const subjects = [
            {
                title: "Lenguaje",
                color: "from-blue-600 to-blue-900",
                icon: "fa-book-open",
                units: [
                    { title: "Lectura Literaria", subs: ["Narrativa", "Lírica"] },
                    { title: "Lectura No Literaria", subs: ["Expositivos", "Argumentativos"] },
                    { title: "Vocabulario", subs: ["Contextual", "Semántica"] },
                    { title: "Producción", subs: ["Coherencia", "Escritura"] }
                ]
            },
            {
                title: "Biología",
                color: "from-pink-600 to-pink-900",
                icon: "fa-dna",
                units: [
                    { title: "Célula", subs: ["Organelos", "Membrana"] },
                    { title: "Genética", subs: ["Mendel", "ADN"] },
                    { title: "Sistemas", subs: ["Nervioso", "Endocrino"] },
                    { title: "Ecología", subs: ["Ecosistemas", "Energía"] }
                ]
            },
            {
                title: "Química",
                color: "from-yellow-500 to-orange-600",
                icon: "fa-flask",
                units: [
                    { title: "Átomo", subs: ["Modelos", "Configuración"] },
                    { title: "Enlaces", subs: ["Iónico", "Covalente"] },
                    { title: "Orgánica", subs: ["Carbono", "Isomería"] },
                    { title: "Estequiometría", subs: ["Mol", "Reacciones"] }
                ]
            },
            {
                title: "Física",
                color: "from-purple-600 to-indigo-900",
                icon: "fa-atom",
                units: [
                    { title: "Ondas", subs: ["Sonido", "Luz"] },
                    { title: "Mecánica", subs: ["Newton", "Cinemática"] },
                    { title: "Energía", subs: ["Calor", "Termodinámica"] },
                    { title: "Electricidad", subs: ["Cargas", "Circuitos"] }
                ]
            },
            {
                title: "Historia",
                color: "from-orange-600 to-red-900",
                icon: "fa-landmark",
                units: [
                    { title: "Mundo", subs: ["Guerras Mundiales", "Fría"] },
                    { title: "Chile", subs: ["Siglo XX", "Dictadura"] },
                    { title: "Ciudadanía", subs: ["Constitución", "DDHH"] },
                    { title: "Geografía", subs: ["Recursos", "Trabajo"] }
                ]
            },
            {
                title: "Matemática M1",
                color: "from-green-600 to-teal-900",
                icon: "fa-calculator",
                units: [
                    { title: "Números", subs: ["Racionales", "Potencias"] },
                    { title: "Álgebra", subs: ["Ecuaciones", "Funciones"] },
                    { title: "Geometría", subs: ["Áreas", "Pitágoras"] },
                    { title: "Probabilidad", subs: ["Azar", "Estadística"] }
                ]
            },
            {
                title: "Matemática M2",
                color: "from-cyan-600 to-blue-900",
                icon: "fa-infinity",
                units: [
                    { title: "Complejos", subs: ["Imaginarios", "Vectores"] },
                    { title: "Trigonometría", subs: ["Seno", "Coseno"] },
                    { title: "Logaritmos", subs: ["Propiedades", "Cálculo"] },
                    { title: "Combinatoria", subs: ["Permutación", "Variación"] }
                ]
            }
        ];

        let currentIndex = 0;
        let isFlipped = false;
        let zoomScale = 1;

        const subjectTitle = document.getElementById('subject-title');
        const backSubjectTitle = document.getElementById('back-subject-title');
        const subjectIcon = document.getElementById('subject-icon');
        const unitsGrid = document.getElementById('units-grid');
        const flipBox = document.getElementById('flip-box');
        const suggestionsBox = document.getElementById('search-suggestions');
        const suggestionsList = document.getElementById('suggestions-list');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function adjustZoom(delta) {
            zoomScale = Math.min(Math.max(0.7, zoomScale + delta), 1.3);
            document.documentElement.style.setProperty('--zoom-level', zoomScale);
            document.getElementById('zoom-label').innerText = `${Math.round(zoomScale * 100)}%`;
        }

        function setTheme(color, el) {
            document.documentElement.style.setProperty('--primary', color);
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            el.classList.add('active');
            updateDisplay(); // Refrescar para aplicar cambios
        }

        function getLevenshteinDistance(a, b) {
            const matrix = Array.from({ length: b.length + 1 }, (_, i) => [i]);
            for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    matrix[i][j] = b[i-1] === a[j-1] 
                        ? matrix[i-1][j-1] 
                        : Math.min(matrix[i-1][j-1] + 1, matrix[i][j-1] + 1, matrix[i-1][j] + 1);
                }
            }
            return matrix[b.length][a.length];
        }

        function handleSearch(query) {
            if (!query) {
                suggestionsBox.style.display = 'none';
                return;
            }
            const q = query.toLowerCase();
            const matches = subjects
                .map(s => ({ 
                    subject: s, 
                    distance: getLevenshteinDistance(q, s.title.toLowerCase()),
                    score: s.title.toLowerCase().includes(q) ? 0 : 1
                }))
                .filter(m => m.score === 0 || m.distance < 4)
                .sort((a, b) => a.score - b.score || a.distance - b.distance)
                .slice(0, 3);

            if (matches.length > 0) {
                suggestionsList.innerHTML = matches.map(m => `
                    <button onclick="selectSubject('${m.subject.title}')" class="text-left px-3 py-2 hover:bg-primary/20 rounded-md text-sm transition-colors w-full">
                        <i class="fas ${m.subject.icon} mr-2 opacity-50"></i>${m.subject.title}
                    </button>
                `).join('');
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        }

        function selectSubject(name) {
            currentIndex = subjects.findIndex(s => s.title === name);
            suggestionsBox.style.display = 'none';
            document.getElementById('main-search').value = '';
            if (isFlipped) toggleFlip();
            updateDisplay();
        }

        function updateDisplay() {
            const s = subjects[currentIndex];
            const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
            
            subjectTitle.innerText = s.title;
            backSubjectTitle.innerText = `Ejes de ${s.title}`;
            subjectIcon.className = `w-32 h-44 rounded-lg mb-6 shadow-2xl flex items-center justify-center overflow-hidden`;
            subjectIcon.style.backgroundColor = primaryColor;
            subjectIcon.innerHTML = `<i class="fas ${s.icon} text-6xl text-white/30"></i>`;
            
            // Tamaño de fuente aumentado en títulos de unidad y subunidades
            unitsGrid.innerHTML = s.units.map((u, i) => `
                <div class="bg-white/5 border border-white/10 p-4 rounded-xl text-left hover:bg-white/10 transition-all">
                    <p class="text-[12px] text-primary font-bold uppercase mb-1">Unidad ${i+1}</p>
                    <h4 class="font-extrabold text-lg mb-3 leading-tight">${u.title}</h4>
                    <div class="flex flex-wrap gap-2">
                        ${u.subs.map(sub => `<span class="text-[13px] bg-primary/20 text-primary px-2.5 py-1 rounded-md font-bold border border-primary/10">${sub}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            if (isFlipped) flipBox.classList.add('flipped');
            else flipBox.classList.remove('flipped');
        }

        function nextSubject() {
            if (isFlipped) toggleFlip();
            currentIndex = (currentIndex + 1) % subjects.length;
            setTimeout(updateDisplay, 150);
        }

        function prevSubject() {
            if (isFlipped) toggleFlip();
            currentIndex = (currentIndex - 1 + subjects.length) % subjects.length;
            setTimeout(updateDisplay, 150);
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#main-search')) suggestionsBox.style.display = 'none';
        });

        updateDisplay();
    </script>
</body>
</html>
